<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" width="360" height="140" role="img" aria-label="Risk Profile Card">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="4" y="4" width="352" height="132" rx="16" fill="#f7f7f7" stroke="#e6e6e6" filter="url(#softShadow)"/>

  <!-- Left Section -->
  <g transform="translate(20,28)">
    <text x="0" y="0" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#777">Risk Profile</text>
    <text x="0" y="18" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="600" fill="#333">Conservative Investor</text>

    <text x="0" y="48" font-family="Inter, Roboto, sans-serif" font-size="26" font-weight="700" fill="#f59e0b">4.2 / 10</text>
    <text x="0" y="64" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#777">Low Risk Appetite</text>

    <!-- Risk Bar -->
    <rect x="0" y="74" width="140" height="6" rx="3" fill="#e5e5e5"/>
    <rect x="0" y="74" width="58.8" height="6" rx="3" fill="#f59e0b"/>
  </g>

  <!-- Radar Chart -->
  <g transform="translate(250,75)" font-family="Inter, Roboto, sans-serif">
    
    <!-- Grid Levels -->
    <polygon points="0,-30 26,-8 16,24 -16,24 -26,-8" fill="none" stroke="#ddd"/>
    <polygon points="0,-24 21,-6 13,19 -13,19 -21,-6" fill="none" stroke="#e5e5e5"/>
    <polygon points="0,-18 15,-5 10,14 -10,14 -15,-5" fill="none" stroke="#eee"/>
    <polygon points="0,-12 10,-3 6,9 -6,9 -10,-3" fill="none" stroke="#f0f0f0"/>
    <polygon points="0,-6 5,-2 3,4 -3,4 -5,-2" fill="none" stroke="#f3f3f3"/>

    <!-- Axis Lines -->
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#ddd"/>
    <line x1="0" y1="0" x2="26" y2="-8" stroke="#ddd"/>
    <line x1="0" y1="0" x2="16" y2="24" stroke="#ddd"/>
    <line x1="0" y1="0" x2="-16" y2="24" stroke="#ddd"/>
    <line x1="0" y1="0" x2="-26" y2="-8" stroke="#ddd"/>

    <!-- Data Shape -->
    <polygon points="0,-18 18,-5 10,14 -8,12 -20,-6"
             fill="#f59e0b" fill-opacity="0.25"
             stroke="#f59e0b" stroke-width="2"/>

    <!-- Labels -->
    <text x="0" y="-36" font-size="9" text-anchor="middle" fill="#777">Risk</text>
    <text x="30" y="-8" font-size="9" fill="#777">Spend</text>
    <text x="18" y="34" font-size="9" fill="#777">Save</text>
    <text x="-30" y="34" font-size="9" fill="#777">Stability</text>
    <text x="-44" y="-8" font-size="9" fill="#777">Growth</text>

  </g>

</svg>